services:
  app:
    build:
      context: .
      dockerfile: dockerfile
    image: sasimga-app:local
    restart: unless-stopped
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: db_samsimga
      DB_USERNAME: root
      DB_PASSWORD: root
      CACHE_STORE: file
      QUEUE_CONNECTION: sync
      SESSION_DRIVER: file
      AI_PREDICTION_URL: ""
      AI_HEALTH_URL: ""
    volumes:
      - app_storage:/var/www/storage
      - app_cache:/var/www/bootstrap/cache
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - sasimga

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
      additional_contexts:
        sasimga-app-assets: service:app
    image: sasimga-nginx:local
    restart: unless-stopped
    ports:
      - "8001:80"
    depends_on:
      - app
    networks:
      - sasimga

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: db_samsimga
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -uroot -proot --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - sasimga

  jenkins:
    build:
      context: .
      dockerfile: Dockerfile.jenkins
    profiles:
      - ci
    restart: unless-stopped
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - sasimga

  prometheus:
    image: prom/prometheus:v2.55.1
    profiles:
      - monitoring
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - sasimga

  grafana:
    image: grafana/grafana:11.4.0
    profiles:
      - monitoring
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - sasimga

volumes:
  app_cache:
  app_storage:
  mysql_data:
  jenkins_home:
  prometheus_data:
  grafana_data:

networks:
  sasimga:
