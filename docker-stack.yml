services:
  app:
    image: sasimga-app:local
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-db_samsimga}
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD:-root}
      CACHE_STORE: file
      QUEUE_CONNECTION: sync
      SESSION_DRIVER: file
      AI_PREDICTION_URL: ${AI_PREDICTION_URL:-}
      AI_HEALTH_URL: ${AI_HEALTH_URL:-}

    volumes:
      - app_storage:/var/www/storage
      - app_cache:/var/www/bootstrap/cache

    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

    networks:
      - sasimga

  nginx:
    image: sasimga-nginx:local

    ports:
      - "80:80"

    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

    networks:
      - sasimga

  mysql:
    image: mysql:8.4

    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-db_samsimga}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}

    volumes:
      - mysql_data:/var/lib/mysql

    deploy:
      replicas: 1

    networks:
      - sasimga

volumes:
  app_cache:
  app_storage:
  mysql_data:

networks:
  sasimga:
    driver: overlay
