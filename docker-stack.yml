services:
  app:
    image: sihiy1/sasimga-jember:latest

    environment:
      APP_ENV: production
      APP_DEBUG: "false"

      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: db_samsimga
      DB_USERNAME: root
      DB_PASSWORD: root

      CACHE_STORE: file
      QUEUE_CONNECTION: sync
      SESSION_DRIVER: file

      AI_PREDICTION_URL: http://ai_prediction:8001/predict
      AI_HEALTH_URL: http://ai_prediction:8001/

    depends_on:
      - mysql

    networks:
      - laravel

  nginx:
    image: sihiy1/sasimga-nginx:latest

    ports:
      - "80:80"

    depends_on:
      - app

    networks:
      - laravel

  mysql:
    image: mysql:8

    environment:
      MYSQL_DATABASE: db_samsimga
      MYSQL_ROOT_PASSWORD: root

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql

    networks:
      - laravel

  ai_prediction:
    image: sihiy1/ai-stock-prediction:latest

    ports:
      - "8002:8001"

    networks:
      - laravel

  jenkins:
    image: jenkins/jenkins:lts

    user: root

    ports:
      - "8080:8080"
      - "50000:50000"

    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock

    networks:
      - laravel

  prometheus:
    image: prom/prometheus:latest

    ports:
      - "9090:9090"

    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

    networks:
      - laravel

  grafana:
    image: grafana/grafana:latest

    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin

    ports:
      - "3000:3000"

    volumes:
      - grafana_data:/var/lib/grafana

    depends_on:
      - prometheus

    networks:
      - laravel

volumes:
  mysql_data:
  jenkins_home:
  prometheus_data:
  grafana_data:

networks:
  laravel:
    driver: overlay
